services:
  mysql:
    image: mysql:8.0
    container_name: bikevn_mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_bikevn}
      MYSQL_DATABASE: ${DB_NAME:-bikevn_db}
      MYSQL_USER: ${DB_USER:-bikevn_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-bikevn_pass}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      MYSQL_INITDB_SKIP_TZINFO: 1
    volumes:
      - bikevn_mysql_data:/var/lib/mysql
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../database/sample_data.sql:/docker-entrypoint-initdb.d/02-sample_data.sql:ro
      - ./mysql.cnf:/etc/mysql/conf.d/mysql.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USER:-bikevn_user}", "-p${DB_PASSWORD:-bikevn_pass}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - bikevn_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: bikevn_phpmyadmin
    restart: unless-stopped
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USER:-bikevn_user}
      PMA_PASSWORD: ${DB_PASSWORD:-bikevn_pass}
      PMA_PORT: 3306
      UPLOAD_LIMIT: 300M
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - bikevn_network
  adminer:
    image: adminer:latest
    container_name: bikevn_adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8082}:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - bikevn_network

volumes:
  bikevn_mysql_data:
    driver: local

networks:
  bikevn_network:
    driver: bridge
