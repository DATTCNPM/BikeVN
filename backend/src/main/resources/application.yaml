server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bikevn_db}?useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:bikevn_user}
    password: ${DB_PASSWORD:bikevn_pass}
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:none}
    show-sql: ${SHOW_SQL:true}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB
app:
  upload-dir: ${UPLOAD_DIR:uploads}

jwt:
  signerKey: ${JWT_SECRET:bW9yZV9zZWN1cmVfYW5kX3JhbmRvbV9rZXlfZm9yX2p3dF9zaWduaW5nX3dpdGhfaHM1MTJfYWxnb3JpdGhtXzEyMzQ1Njc4OTA=}
